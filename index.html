<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8">
    <!-- Ensures proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title shown in the browser tab -->
    <title>🪨📄✂️</title>
    <!-- Links the external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Main wrapper for the entire game layout -->
    <div class="game-container">

        <!-- Left column: Player stats and choices -->
        <div class="column player-side">
            <h2>Player</h2>
            <!-- Spans with IDs allow JavaScript to update the text dynamically -->
            <p>Wins: <span id="HWins">0</span></p>
            <p>Losses: <span id="HLosses">0</span></p>
            <p>Choice: <span id="human">Make your choice</span></p>
        </div>

        <!-- Middle column: Action buttons and game outcome -->
        <div class="column middle-side">
            <!-- Displays the winner of the current round -->
            <p class="result-text">Result: <span id="result">Result</span></p>
            <!-- Container for the playable buttons -->
            <div class="buttons">
                <button id="rock">Rock</button>
                <button id="paper">Paper</button>
                <button id="scissors">Scissors</button>
                <button id="lizard">Lizard</button>
                <button id="spock">Spock</button>
            </div>
        </div>

        <!-- Right column: Computer stats and choices -->
        <div class="column cpu-side">
            <h2>Computer</h2>
            <p>Wins: <span id="CPUWins">0</span></p>
            <p>Losses: <span id="CPULosses">0</span></p>
            <p>Choice: <span id="computer">Deciding...</span></p>
        </div>

    </div>

    <svg style="display: none;">
        <defs>
            <filter id="smear-filter">
                <feGaussianBlur stdDeviation="0 10" />
            </filter>
        </defs>
    </svg>
    <!-- Links the external JavaScript file containing game logic -->
    <script src="script.js"></script>
</body>

</html>
