<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪨📄✂️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
    <!-- Linker kolom: Player -->
    <div class="column player-side">
        <h2>Player</h2>
        <p>Wins: <span id="HWins">0</span></p>
        <p>Losses: <span id="HLosses">0</span></p>
        <p>Choice: <span id="human">Make your choice</span></p>
    </div>

    <!-- Middelste kolom: Buttons & Resultaat -->
    <div class="column middle-side">
        <div class="buttons">
            <button id="rock">Rock</button>
            <button id="paper">Paper</button>
            <button id="scissors">Scissors</button>
        </div>
        <p class="result-text">Result: <span id="result">Result</span></p>
    </div>

    <!-- Rechter kolom: Computer -->
    <div class="column cpu-side">
        <h2>Computer</h2>
        <p>Wins: <span id="CPUWins">0</span></p>
        <p>Losses: <span id="CPULosses">0</span></p>
        <p>Choice: <span id="computer">Deciding...</span></p>
    </div>
</div>
    <script src="script.js"></script>
</body>

</html>
